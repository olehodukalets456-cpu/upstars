<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expla — SMM Планер</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7fc;
  --surface:#ffffff;
  --border:#ebe8f5;
  --border2:#d8d3ef;
  --accent:#6c47ff;
  --accent-light:#f0edff;
  --accent-mid:#8b6dff;
  --text:#1c1733;
  --text2:#6b6894;
  --text3:#a09dc0;
  --ig:#e1306c;--ig-bg:#fff0f5;--ig-border:#f9c0d4;
  --li:#0a66c2;--li-bg:#eff6ff;--li-border:#bfdbfe;
  --tg:#229ed9;--tg-bg:#e8f7ff;--tg-border:#a8ddff;
  --tt:#010101;--tt-bg:#f3f3f3;--tt-border:#d1d1d1;
  --fb:#1877f2;--fb-bg:#eff6ff;--fb-border:#bfdbfe;
  --yt:#ff0000;--yt-bg:#fff5f5;--yt-border:#fecaca;
  --tw:#1da1f2;--tw-bg:#e8f5fe;--tw-border:#a8d8f8;
  --idea-bg:#f0edff;--idea-c:#5b21b6;
  --sched-bg:#fffbeb;--sched-c:#92400e;
  --pub-bg:#ecfdf5;--pub-c:#065f46;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* PASSWORD */
.pw-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center}
.pw-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:360px;text-align:center}
.pw-logo{font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:1.5rem}
.pw-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:.5rem}
.pw-sub{font-size:13px;color:var(--text2);margin-bottom:1.5rem}
.pw-input{width:100%;border:1.5px solid var(--border2);border-radius:10px;padding:11px 14px;font-size:15px;color:var(--text);font-family:'Inter',sans-serif;outline:none;text-align:center;letter-spacing:.15em;transition:border-color .2s;background:var(--surface);margin-bottom:10px}
.pw-input:focus{border-color:var(--accent)}
.pw-input.err{border-color:#ef4444}
.pw-btn{width:100%;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;padding:12px;cursor:pointer;font-family:'Inter',sans-serif}
.pw-btn:hover{background:#5538e6}
.pw-err{font-size:12px;color:#ef4444;margin-top:6px;min-height:16px}

/* LAYOUT */
.layout{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;padding:1.25rem 0}
.sb-logo{padding:0 1.25rem 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1rem}
.sb-logo-name{font-size:16px;font-weight:900;color:var(--text);letter-spacing:-.02em}
.sb-logo-name span{color:var(--accent)}
.sb-logo-sub{font-size:11px;color:var(--text3);font-weight:600;margin-top:2px}
.sb-section{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:0 1.25rem;margin:1rem 0 .5rem}
.sb-item{display:flex;align-items:center;gap:10px;padding:.6rem 1.25rem;cursor:pointer;border-radius:0;transition:all .15s;font-size:13px;font-weight:600;color:var(--text2);border-left:3px solid transparent;margin:1px 0}
.sb-item:hover{background:var(--accent-light);color:var(--accent)}
.sb-item.active{background:var(--accent-light);color:var(--accent);border-left-color:var(--accent)}
.sb-icon{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.sb-icon.cp{background:#e0f2fe;color:#0369a1}
.sb-icon.rs{background:#fce7f3;color:#9d174d}
.sb-icon.all{background:var(--accent-light);color:var(--accent)}
.sb-bottom{margin-top:auto;padding:1rem 1.25rem;border-top:1px solid var(--border)}
.sync-row{display:flex;align-items:center;gap:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sync-dot.ok{background:#10b981}
.sync-dot.saving{background:#f59e0b}
.sync-dot.err{background:#ef4444}
.sync-txt{font-size:11px;color:var(--text3);font-weight:600}

/* MAIN */
.content{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.875rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:12px}
.page-title{font-size:17px;font-weight:800;color:var(--text)}
.view-tabs{display:flex;gap:2px;background:var(--accent-light);border-radius:9px;padding:3px}
.view-tab{font-size:12px;font-weight:700;padding:5px 14px;border-radius:7px;border:none;color:var(--accent);cursor:pointer;background:transparent;font-family:'Inter',sans-serif;transition:all .2s}
.view-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(108,71,255,.12)}
.topbar-right{display:flex;align-items:center;gap:8px}
.filter-sel{background:var(--surface);border:1.5px solid var(--border2);border-radius:9px;color:var(--text);font-size:12px;font-weight:600;padding:7px 10px;font-family:'Inter',sans-serif;outline:none;cursor:pointer}
.filter-sel:focus{border-color:var(--accent)}
.new-btn{background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;padding:9px 18px;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s;white-space:nowrap}
.new-btn:hover{background:#5538e6}

.filters-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.625rem 1.5rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fb-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-right:4px}
.ftag{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;border:1.5px solid var(--border2);color:var(--text2);cursor:pointer;background:transparent;font-family:'Inter',sans-serif;transition:all .15s}
.ftag:hover{border-color:var(--accent);color:var(--accent)}
.ftag.active{background:var(--accent);border-color:var(--accent);color:#fff}
.fdiv{width:1px;height:18px;background:var(--border);margin:0 4px}

.main-area{flex:1;padding:1.25rem 1.5rem;overflow:auto}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat-c{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;flex-direction:column;gap:4px}
.stat-n{font-size:26px;font-weight:900;line-height:1}
.stat-n.purple{color:var(--accent)}
.stat-n.amber{color:#d97706}
.stat-n.green{color:#059669}
.stat-n.gray{color:var(--text)}
.stat-l{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}

/* CALENDAR */
.cal-nav-row{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.cal-btn{background:var(--surface);border:1.5px solid var(--border2);border-radius:8px;color:var(--accent);font-size:16px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:800;transition:all .15s}
.cal-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.cal-month-label{font-size:17px;font-weight:800;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.cal-dn{background:var(--accent-light);padding:8px 6px;text-align:center;font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.04em}
.cal-cell{background:var(--surface);padding:6px;min-height:120px;vertical-align:top;transition:background .15s}
.cal-cell:hover{background:#faf9ff}
.cal-cell.other{background:var(--bg);opacity:.6}
.cal-cell.today{background:#faf8ff}
.cal-cell.today .day-num-inner{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.day-num{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.day-num-inner{font-size:12px;font-weight:700}
.cal-post-card{border-radius:7px;padding:5px 7px;margin-bottom:4px;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.cal-post-card:hover{filter:brightness(.97)}
.cal-post-title{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-post-plats{display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-bottom:3px}
.pbadge{font-size:9px;font-weight:800;padding:2px 5px;border-radius:4px;border:1px solid;display:inline-flex;align-items:center;gap:2px;white-space:nowrap}
.cal-post-bottom{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.type-pill{font-size:9px;font-weight:700;background:rgba(108,71,255,.1);color:var(--accent);border-radius:3px;padding:1px 5px}
.cross-pill{font-size:9px;font-weight:700;background:#fef3c7;color:#92400e;border-radius:3px;padding:1px 5px}
.status-dot-cal{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd-idea{background:var(--accent)}
.sd-scheduled{background:#d97706}
.sd-published{background:#059669}
.cal-add-btn{font-size:10px;color:var(--text3);cursor:pointer;text-align:center;margin-top:3px;padding:2px;border-radius:4px;transition:all .15s}
.cal-add-btn:hover{background:var(--accent-light);color:var(--accent)}

/* PLATFORM COLORS */
.p-ig{background:var(--ig-bg);border-color:var(--ig-border);color:var(--ig)}
.p-li{background:var(--li-bg);border-color:var(--li-border);color:var(--li)}
.p-tg{background:var(--tg-bg);border-color:var(--tg-border);color:var(--tg)}
.p-tt{background:var(--tt-bg);border-color:var(--tt-border);color:var(--tt)}
.p-fb{background:var(--fb-bg);border-color:var(--fb-border);color:var(--fb)}
.p-yt{background:var(--yt-bg);border-color:var(--yt-border);color:var(--yt)}
.p-tw{background:var(--tw-bg);border-color:var(--tw-border);color:var(--tw)}

/* POST CARD left border colors by first platform */
.pc-ig{background:var(--ig-bg);border-color:var(--ig-border)}
.pc-li{background:var(--li-bg);border-color:var(--li-border)}
.pc-tg{background:var(--tg-bg);border-color:var(--tg-border)}
.pc-tt{background:var(--tt-bg);border-color:var(--tt-border)}
.pc-fb{background:var(--fb-bg);border-color:var(--fb-border)}
.pc-yt{background:var(--yt-bg);border-color:var(--yt-border)}
.pc-tw{background:var(--tw-bg);border-color:var(--tw-border)}
.pc-none{background:#f8f7fc;border-color:var(--border2)}

/* TABLE */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.tbl-wrap table{width:100%;border-collapse:collapse}
.tbl-wrap th{padding:10px 14px;text-align:left;font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--accent-light)}
.tbl-wrap td{padding:10px 14px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border)}
.tbl-wrap tr:last-child td{border-bottom:none}
.tbl-wrap tr:hover td{background:var(--accent-light)}
.td-name{color:var(--text);font-weight:600;cursor:pointer}
.td-name:hover{color:var(--accent)}
.status-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
.sb-idea{background:var(--idea-bg);color:var(--idea-c)}
.sb-scheduled{background:var(--sched-bg);color:var(--sched-c)}
.sb-published{background:var(--pub-bg);color:var(--pub-c)}
.tbl-type{font-size:10px;font-weight:700;background:var(--accent-light);color:var(--accent);padding:3px 8px;border-radius:5px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(28,23,51,.35);z-index:500;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:20px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;border:1px solid var(--border)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border)}
.modal-head-title{font-size:16px;font-weight:800;color:var(--text)}
.modal-x{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;padding:2px;transition:color .15s}
.modal-x:hover{color:var(--text)}
.modal-body{padding:1.5rem}
.f-label{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:6px}
.f-input{width:100%;border:1.5px solid var(--border2);border-radius:9px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;background:var(--surface)}
.f-input:focus{border-color:var(--accent)}
.f-input::placeholder{color:var(--text3)}
.f-textarea{resize:vertical;min-height:70px}
.f-row{margin-bottom:1rem}
.f-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.plat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.plat-option{border:1.5px solid var(--border2);border-radius:9px;padding:8px 6px;text-align:center;cursor:pointer;transition:all .15s;font-size:11px;font-weight:700;color:var(--text2);user-select:none}
.plat-option:hover{border-color:var(--accent);color:var(--accent)}
.plat-option.sel{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.plat-option .po-icon{font-size:14px;margin-bottom:2px;display:block;height:18px;width:18px;border-radius:4px;margin:0 auto 3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.po-ig{background:var(--ig-bg);color:var(--ig)}
.po-li{background:var(--li-bg);color:var(--li)}
.po-tg{background:var(--tg-bg);color:var(--tg)}
.po-tt{background:var(--tt-bg);color:var(--tt)}
.po-fb{background:var(--fb-bg);color:var(--fb)}
.po-yt{background:var(--yt-bg);color:var(--yt)}
.po-tw{background:var(--tw-bg);color:var(--tw)}
.cross-note{background:var(--sched-bg);border:1px solid #fde68a;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--sched-c);margin-top:8px;display:none}
.modal-foot{display:flex;align-items:center;gap:8px;padding:1rem 1.5rem;border-top:1px solid var(--border)}
.del-btn{background:none;border:1.5px solid var(--border2);border-radius:9px;color:#ef4444;font-size:13px;font-weight:600;padding:8px 14px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;margin-right:auto}
.del-btn:hover{background:#fff5f5;border-color:#ef4444}
.cancel-btn{background:none;border:1.5px solid var(--border2);border-radius:9px;color:var(--text2);font-size:13px;font-weight:600;padding:8px 16px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.cancel-btn:hover{border-color:var(--text2)}
.save-btn{background:var(--accent);border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:700;padding:9px 22px;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
.save-btn:hover{background:#5538e6}

.empty{text-align:center;padding:4rem 1rem;color:var(--text3)}
.empty-t{font-size:15px;font-weight:700;margin-bottom:6px}

@media(max-width:768px){
  .sidebar{display:none}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .plat-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="pw-screen" id="pw-screen">
  <div class="pw-card">
    <div class="pw-logo">Expla · SMM Studio</div>
    <div class="pw-title">Вітаємо, Вікторіє!</div>
    <div class="pw-sub">Введи пароль для входу в планер</div>
    <input class="pw-input" id="pw-inp" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">Увійти</button>
    <div class="pw-err" id="pw-err"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-title" id="modal-title">Новий пост</div>
      <button class="modal-x" onclick="closeModal()">&#215;</button>
    </div>
    <div class="modal-body">
      <div class="f-row">
        <label class="f-label">Назва посту</label>
        <input class="f-input" id="fi-name" placeholder="Назва посту...">
      </div>
      <div class="f-grid2">
        <div>
          <label class="f-label">Проєкт</label>
          <select class="f-input" id="fi-channel">
            <option value="cpamatica">Cpamatica</option>
            <option value="resality">Resality</option>
          </select>
        </div>
        <div>
          <label class="f-label">Дата публікації</label>
          <input class="f-input" id="fi-date" type="date">
        </div>
      </div>
      <div class="f-row">
        <label class="f-label">Платформи</label>
        <div class="plat-grid" id="plat-grid"></div>
        <div class="cross-note" id="cross-note">Крос-постинг — пост вийде на кількох платформах одночасно</div>
      </div>
      <div class="f-grid2">
        <div>
          <label class="f-label">Тип контенту</label>
          <select class="f-input" id="fi-type">
            <option value="">— оберіть —</option>
            <option>Reels</option>
            <option>Carousel</option>
            <option>Stories</option>
            <option>Post</option>
            <option>Video</option>
            <option>Article</option>
            <option>Meme</option>
          </select>
        </div>
        <div>
          <label class="f-label">Статус</label>
          <select class="f-input" id="fi-status">
            <option value="idea">Post idea</option>
            <option value="scheduled">Scheduled</option>
            <option value="published">Published</option>
          </select>
        </div>
      </div>
      <div class="f-row">
        <label class="f-label">URL (посилання на пост)</label>
        <input class="f-input" id="fi-url" placeholder="https://...">
      </div>
      <div class="f-row">
        <label class="f-label">Нотатки</label>
        <textarea class="f-input f-textarea" id="fi-notes" placeholder="Нотатки, ідеї, референси..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="del-btn" id="del-btn" onclick="deletePost()" style="display:none">Видалити пост</button>
      <button class="cancel-btn" onclick="closeModal()">Скасувати</button>
      <button class="save-btn" onclick="savePost()">Зберегти</button>
    </div>
  </div>
</div>

<div class="layout" id="app" style="display:none">
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-name">SMM <span>Планер</span></div>
      <div class="sb-logo-sub">Expla · Content Studio</div>
    </div>
    <div class="sb-section">Проєкти</div>
    <div class="sb-item active" data-ch="all" onclick="setChannel('all')">
      <div class="sb-icon all">✦</div>Всі проєкти
    </div>
    <div class="sb-item" data-ch="cpamatica" onclick="setChannel('cpamatica')">
      <div class="sb-icon cp">CP</div>Cpamatica
    </div>
    <div class="sb-item" data-ch="resality" onclick="setChannel('resality')">
      <div class="sb-icon rs">RS</div>Resality
    </div>
    <div class="sb-section">Перегляд</div>
    <div class="sb-item active" data-view="calendar" onclick="setView('calendar')">
      <div class="sb-icon all">▦</div>Календар
    </div>
    <div class="sb-item" data-view="table" onclick="setView('table')">
      <div class="sb-icon all">≡</div>Таблиця
    </div>
    <div class="sb-bottom">
      <div class="sync-row">
        <div class="sync-dot" id="sync-dot"></div>
        <span class="sync-txt" id="sync-txt">завантаження...</span>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title" id="page-title">Всі проєкти</div>
        <div class="view-tabs">
          <button class="view-tab active" data-view="calendar" onclick="setView('calendar')">Календар</button>
          <button class="view-tab" data-view="table" onclick="setView('table')">Таблиця</button>
        </div>
      </div>
      <div class="topbar-right">
        <select class="filter-sel" id="month-sel" onchange="render()">
          <option value="">Всі місяці</option>
        </select>
        <button class="new-btn" onclick="openModal()">+ Новий пост</button>
      </div>
    </div>

    <div class="filters-bar">
      <span class="fb-label">Платформа:</span>
      <div id="plat-filters"></div>
      <div class="fdiv"></div>
      <span class="fb-label">Тип:</span>
      <div id="type-filters"></div>
    </div>

    <div class="main-area">
      <div class="stats-row" id="stats-row"></div>
      <div id="view-area"></div>
    </div>
  </div>
</div>

<script>
const API_KEY='$2a$10$7Xef9jg3UMbuONAEF7yBP.Nevalf3APcYT7HryCWCbjRUPOG7Hea6';
const BIN_ID='69c6cc56b7ec241ddcae03d7';
const SMM_KEY='smm_v2';
const CORRECT_PW='221529';

const PLATS=['Instagram','LinkedIn','Telegram','TikTok','Facebook','YouTube','Twitter'];
const PLAT_CLS={Instagram:'ig',LinkedIn:'li',Telegram:'tg',TikTok:'tt',Facebook:'fb',YouTube:'yt',Twitter:'tw'};
const PLAT_SHORT={Instagram:'IG',LinkedIn:'LI',Telegram:'TG',TikTok:'TT',Facebook:'FB',YouTube:'YT',Twitter:'TW'};
const MONTHS_UA=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const DAYS_UA=['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];

let posts=[];
let view='calendar';
let channel='all';
let platF='';
let typeF='';
let calY=new Date().getFullYear();
let calM=new Date().getMonth();
let editId=null;
let isDirty=false;
let isSaving=false;
let lastJSON='';

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function syncStatus(s,t){
  document.getElementById('sync-dot').className='sync-dot '+s;
  document.getElementById('sync-txt').textContent=t;
}

async function loadData(silent=false){
  if(isSaving)return;
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
    const j=await r.json();
    const inc=JSON.stringify(j.record?.[SMM_KEY]||[]);
    if(inc!==lastJSON){
      posts=j.record?.[SMM_KEY]||[];
      lastJSON=inc;
      localStorage.setItem('smm_bak',inc);
      render();
      if(!silent)syncStatus('ok','синхронізовано');
    } else {
      if(!silent)syncStatus('ok','актуально');
    }
  }catch(e){
    if(!silent){
      posts=JSON.parse(localStorage.getItem('smm_bak')||'[]');
      syncStatus('err','офлайн');
      render();
    }
  }
}

async function saveData(){
  if(!isDirty)return;
  isSaving=true;
  syncStatus('saving','збереження...');
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
    const j=await r.json();
    const cur=j.record||{};
    cur[SMM_KEY]=posts;
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify(cur)
    });
    lastJSON=JSON.stringify(posts);
    localStorage.setItem('smm_bak',lastJSON);
    isDirty=false;
    syncStatus('ok','збережено');
  }catch(e){syncStatus('err','помилка збереження');}
  isSaving=false;
}

function markDirty(){isDirty=true;syncStatus('saving','незбережені зміни');}

function checkPw(){
  const v=document.getElementById('pw-inp').value;
  if(v===CORRECT_PW){
    localStorage.setItem('smm_auth','1');
    document.getElementById('pw-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    init();
  } else {
    const inp=document.getElementById('pw-inp');
    inp.className='pw-input err';
    document.getElementById('pw-err').textContent='Невірний пароль';
    setTimeout(()=>{inp.className='pw-input';document.getElementById('pw-err').textContent='';},1400);
  }
}

async function init(){
  buildPlatGrid();
  await loadData();
  buildMonthSel();
  buildPlatFilters();
  buildTypeFilters();
  setInterval(()=>loadData(true),8000);
  setInterval(saveData,5*60*1000);
}

if(localStorage.getItem('smm_auth')==='1'){
  document.getElementById('pw-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  init();
} else {
  setTimeout(()=>document.getElementById('pw-inp').focus(),100);
}

function setChannel(ch){
  channel=ch;
  document.querySelectorAll('.sb-item[data-ch]').forEach(el=>el.classList.toggle('active',el.dataset.ch===ch));
  const titles={all:'Всі проєкти',cpamatica:'Cpamatica',resality:'Resality'};
  document.getElementById('page-title').textContent=titles[ch]||ch;
  render();
}

function setView(v){
  view=v;
  document.querySelectorAll('[data-view]').forEach(el=>el.classList.toggle('active',el.dataset.view===v));
  render();
}

function getFiltered(){
  return posts.filter(p=>{
    if(channel!=='all'&&p.channel!==channel)return false;
    const ms=document.getElementById('month-sel').value;
    if(ms&&p.date&&!p.date.startsWith(ms))return false;
    if(platF&&!(p.platforms||[]).includes(platF))return false;
    if(typeF&&p.type!==typeF)return false;
    return true;
  });
}

function buildMonthSel(){
  const sel=document.getElementById('month-sel');
  const cur=[...sel.options].map(o=>o.value);
  const ys=[...new Set(posts.map(p=>p.date?new Date(p.date).getFullYear():null).filter(Boolean))].sort();
  ys.forEach(y=>MONTHS_UA.forEach((m,mi)=>{
    const v=`${y}-${String(mi+1).padStart(2,'0')}`;
    if(!cur.includes(v)){const o=document.createElement('option');o.value=v;o.textContent=`${m} ${y}`;sel.appendChild(o);}
  }));
}

function buildPlatFilters(){
  const plats=[...new Set(posts.flatMap(p=>p.platforms||[]))].sort();
  document.getElementById('plat-filters').innerHTML=
    `<button class="ftag${!platF?' active':''}" onclick="setPlatF('')">Всі</button>`+
    plats.map(p=>`<button class="ftag${platF===p?' active':''}" onclick="setPlatF('${p}')">${p}</button>`).join('');
}

function buildTypeFilters(){
  const types=[...new Set(posts.map(p=>p.type).filter(Boolean))].sort();
  document.getElementById('type-filters').innerHTML=
    `<button class="ftag${!typeF?' active':''}" onclick="setTypeF('')">Всі</button>`+
    types.map(t=>`<button class="ftag${typeF===t?' active':''}" onclick="setTypeF('${t}')">${t}</button>`).join('');
}

function setPlatF(p){platF=p;buildPlatFilters();render();}
function setTypeF(t){typeF=t;buildTypeFilters();render();}

function renderStats(f){
  const c={idea:0,scheduled:0,published:0};
  f.forEach(p=>c[p.status]=(c[p.status]||0)+1);
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-c"><div class="stat-n purple">${c.idea||0}</div><div class="stat-l">Post idea</div></div>
    <div class="stat-c"><div class="stat-n amber">${c.scheduled||0}</div><div class="stat-l">Scheduled</div></div>
    <div class="stat-c"><div class="stat-n green">${c.published||0}</div><div class="stat-l">Published</div></div>
    <div class="stat-c"><div class="stat-n gray">${f.length}</div><div class="stat-l">Всього постів</div></div>
  `;
}

function platCardClass(plats){
  const p=(plats||[])[0];
  if(!p)return'pc-none';
  return'pc-'+(PLAT_CLS[p]||'none');
}

function platBadges(plats){
  return(plats||[]).map(p=>`<span class="pbadge p-${PLAT_CLS[p]||''}">${PLAT_SHORT[p]||p}</span>`).join('');
}

function statusDot(s){
  const m={idea:'sd-idea',scheduled:'sd-scheduled',published:'sd-published'};
  return`<div class="status-dot-cal ${m[s]||'sd-idea'}"></div>`;
}

function render(){
  const f=getFiltered();
  renderStats(f);
  buildMonthSel();
  buildPlatFilters();
  buildTypeFilters();
  if(view==='calendar')renderCal(f);
  else renderTable(f);
}

function renderCal(filtered){
  const el=document.getElementById('view-area');
  const first=new Date(calY,calM,1);
  const last=new Date(calY,calM+1,0);
  const startDow=first.getDay();
  const today=new Date();

  let html=`<div class="cal-nav-row">
    <button class="cal-btn" onclick="prevM()">&#8249;</button>
    <div class="cal-month-label">${MONTHS_UA[calM]} ${calY}</div>
    <button class="cal-btn" onclick="nextM()">&#8250;</button>
  </div>
  <div class="cal-grid">
    ${DAYS_UA.map(d=>`<div class="cal-dn">${d}</div>`).join('')}`;

  for(let i=0;i<startDow;i++){
    const d=new Date(calY,calM,1-startDow+i);
    html+=`<div class="cal-cell other"><div class="day-num"><span class="day-num-inner">${d.getDate()}</span></div></div>`;
  }

  for(let d=1;d<=last.getDate();d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=today.getFullYear()===calY&&today.getMonth()===calM&&today.getDate()===d;
    const dayPosts=filtered.filter(p=>p.date===ds);
    html+=`<div class="cal-cell${isToday?' today':''}">
      <div class="day-num"><span class="day-num-inner">${d}</span></div>
      ${dayPosts.map(p=>`
        <div class="cal-post-card ${platCardClass(p.platforms)}" onclick="openModal('${p.id}')">
          <div class="cal-post-title">${esc(p.name)}</div>
          <div class="cal-post-plats">${platBadges(p.platforms)}</div>
          <div class="cal-post-bottom">
            ${statusDot(p.status)}
            ${p.type?`<span class="type-pill">${esc(p.type)}</span>`:''}
            ${(p.platforms||[]).length>1?`<span class="cross-pill">крос ×${p.platforms.length}</span>`:''}
            ${p.channel?`<span style="font-size:9px;font-weight:700;color:var(--text3);margin-left:auto">${p.channel==='cpamatica'?'CP':'RS'}</span>`:''}
          </div>
        </div>`).join('')}
      <div class="cal-add-btn" onclick="openModalDate('${ds}')">+ додати</div>
    </div>`;
  }

  const rem=(7-((startDow+last.getDate())%7))%7;
  for(let i=1;i<=rem;i++){
    html+=`<div class="cal-cell other"><div class="day-num"><span class="day-num-inner">${i}</span></div></div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

function prevM(){calM--;if(calM<0){calM=11;calY--;}render();}
function nextM(){calM++;if(calM>11){calM=0;calY++;}render();}

function renderTable(filtered){
  const el=document.getElementById('view-area');
  if(!filtered.length){el.innerHTML=`<div class="empty"><div class="empty-t">Немає постів</div></div>`;return;}
  const sorted=[...filtered].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const STATUS_LBL={idea:'Post idea',scheduled:'Scheduled',published:'Published'};
  const STATUS_CLS={idea:'sb-idea',scheduled:'sb-scheduled',published:'sb-published'};
  el.innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr><th>Назва</th><th>Проєкт</th><th>Дата</th><th>Платформи</th><th>Тип</th><th>Статус</th><th>URL</th></tr></thead>
    <tbody>${sorted.map(p=>`<tr>
      <td class="td-name" onclick="openModal('${p.id}')">${esc(p.name)||'—'}</td>
      <td style="font-size:11px;font-weight:700;color:var(--text3);text-transform:capitalize">${p.channel||'—'}</td>
      <td style="white-space:nowrap;font-size:12px">${fmtDate(p.date)}</td>
      <td>${(p.platforms||[]).map(pl=>`<span class="pbadge p-${PLAT_CLS[pl]||''}">${pl}</span>`).join('')}</td>
      <td>${p.type?`<span class="tbl-type">${esc(p.type)}</span>`:'—'}</td>
      <td><span class="status-badge ${STATUS_CLS[p.status]||'sb-idea'}">${STATUS_LBL[p.status]||'Post idea'}</span></td>
      <td>${p.url?`<a href="${esc(p.url)}" target="_blank" style="color:var(--accent);font-size:12px;font-weight:600">Відкрити</a>`:'—'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function fmtDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}.${m}.${y}`;}

function buildPlatGrid(){
  document.getElementById('plat-grid').innerHTML=PLATS.map(p=>`
    <div class="plat-option" id="po-${p}" onclick="togglePlat('${p}')">
      <div class="po-icon po-${PLAT_CLS[p]||''}">${PLAT_SHORT[p]||p[0]}</div>
      ${p}
    </div>`).join('');
}

function togglePlat(p){
  const el=document.getElementById('po-'+p);
  el.classList.toggle('sel');
  const cnt=document.querySelectorAll('.plat-option.sel').length;
  document.getElementById('cross-note').style.display=cnt>1?'block':'none';
}

function getSelPlats(){return[...document.querySelectorAll('.plat-option.sel')].map(el=>el.id.replace('po-',''));}
function setSelPlats(plats){
  document.querySelectorAll('.plat-option').forEach(el=>{
    const p=el.id.replace('po-','');
    el.classList.toggle('sel',(plats||[]).includes(p));
  });
  document.getElementById('cross-note').style.display=(plats||[]).length>1?'block':'none';
}

function openModal(id,date){
  editId=id||null;
  const p=id?posts.find(x=>x.id===id):null;
  document.getElementById('modal-title').textContent=p?'Редагувати пост':'Новий пост';
  document.getElementById('del-btn').style.display=p?'block':'none';
  document.getElementById('fi-name').value=p?.name||'';
  document.getElementById('fi-channel').value=p?.channel||'cpamatica';
  document.getElementById('fi-date').value=p?.date||date||'';
  document.getElementById('fi-type').value=p?.type||'';
  document.getElementById('fi-status').value=p?.status||'idea';
  document.getElementById('fi-url').value=p?.url||'';
  document.getElementById('fi-notes').value=p?.notes||'';
  setSelPlats(p?.platforms||[]);
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('fi-name').focus(),100);
}

function openModalDate(date){openModal(null,date);}

function closeModal(){
  document.getElementById('modal-bg').classList.remove('open');
  editId=null;
}

function savePost(){
  const name=document.getElementById('fi-name').value.trim();
  if(!name)return;
  const p={
    id:editId||'p_'+Date.now(),
    name,
    channel:document.getElementById('fi-channel').value,
    date:document.getElementById('fi-date').value,
    platforms:getSelPlats(),
    type:document.getElementById('fi-type').value,
    status:document.getElementById('fi-status').value,
    url:document.getElementById('fi-url').value.trim(),
    notes:document.getElementById('fi-notes').value.trim()
  };
  if(editId){const i=posts.findIndex(x=>x.id===editId);if(i>-1)posts[i]=p;}
  else posts.push(p);
  markDirty();closeModal();buildMonthSel();render();
}

function deletePost(){
  if(!editId||!confirm('Видалити пост?'))return;
  posts=posts.filter(p=>p.id!==editId);
  markDirty();closeModal();render();
}

document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
