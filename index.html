<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM T4 (M2) — Link Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a0f;min-height:100vh;display:flex;justify-content:center;padding:2.5rem 1rem;position:relative;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.wrap{width:100%;max-width:640px;position:relative;z-index:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes borderGlow{0%,100%{border-color:#7F77DD}50%{border-color:#534AB7}}
.anim{animation:fadeUp .5s ease}
.header{text-align:center;margin-bottom:2.5rem}
.logo{display:inline-flex;align-items:center;gap:8px;margin-bottom:.5rem;flex-wrap:wrap;justify-content:center}
.logo-team{font-size:32px;font-weight:900;color:#fff;letter-spacing:-.03em}
.logo-t4{font-size:20px;font-weight:900;color:#7F77DD;letter-spacing:-.02em}
.logo-m2{font-size:14px;font-weight:700;color:#534AB7;background:#1a1229;border:1px solid #2d1f5e;border-radius:6px;padding:3px 10px;letter-spacing:.06em}
.tagline{font-size:11px;color:#333;font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-top:.25rem}
.card{background:#111118;border:1px solid #1e1e30;border-radius:16px;padding:1.5rem;margin-bottom:1rem;transition:border-color .3s}
.card:hover{border-color:#2a2a45}
.section-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#534AB7;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:#1e1e30}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
label{font-size:12px;color:#666;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:600;border-radius:4px;padding:2px 7px;letter-spacing:.04em;white-space:nowrap}
.tag.req{background:#1a1229;color:#7F77DD;border:1px solid #2d1f5e}
.tag.fix{background:#0d1f1a;color:#1D9E75;border:1px solid #0f3d2e}
.tag.opt{background:#1a1a1a;color:#555;border:1px solid #2a2a2a}
.tag.test{background:#1f1500;color:#BA7517;border:1px solid #3d2a00}
input[type=text]{width:100%;background:#0d0d16;border:1px solid #1e1e30;border-radius:8px;padding:9px 12px;font-size:13px;color:#fff;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
input[type=text]:focus{border-color:#534AB7;box-shadow:0 0 0 3px rgba(83,74,183,.15)}
input[type=text]::placeholder{color:#555}
.fixed{background:#0a0a12;border:1px solid #151520;border-radius:8px;padding:9px 12px;font-size:13px;color:#1D9E75;font-family:'Inter',monospace}
.sub2-box{background:#0d0d16;border:1px solid #1e1e30;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.sub2-option{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 10px;border-radius:8px;border:1px solid transparent;transition:border-color .2s,background .2s}
.sub2-option:hover{background:#141420}
.sub2-option.selected{border-color:#2d1f5e;background:#12101e}
.sub2-radio{width:16px;height:16px;border-radius:50%;border:2px solid #2d2d45;background:#0a0a12;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.sub2-option.selected .sub2-radio{border-color:#7F77DD}
.sub2-radio-dot{width:8px;height:8px;border-radius:50%;background:#7F77DD;display:none}
.sub2-option.selected .sub2-radio-dot{display:block}
.sub2-text{display:flex;flex-direction:column;gap:2px;flex:1}
.sub2-title{font-size:13px;color:#888;font-weight:500}
.sub2-option.selected .sub2-title{color:#AFA9EC}
.sub2-val{font-size:11px;color:#333;font-family:'Inter',monospace}
.sub2-option.selected .sub2-val{color:#534AB7}
.sub2-custom-wrap{margin-top:2px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:#0d0d16;border:1px solid #1e1e30;border-radius:10px;padding:10px 14px;cursor:pointer;transition:border-color .2s;user-select:none;gap:12px}
.toggle-row:hover{border-color:#2d1f5e}
.toggle-row.active{border-color:#BA7517;background:#100e00}
.toggle-left{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.toggle-title{font-size:13px;color:#888;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toggle-title.active{color:#EF9F27}
.toggle-sub{font-size:11px;color:#333;font-family:'Inter',monospace}
.toggle-sub.active{color:#BA7517}
.switch{width:34px;height:20px;background:#1e1e30;border-radius:10px;position:relative;transition:background .2s;flex-shrink:0}
.switch.on{background:#854F0B}
.switch::after{content:'';position:absolute;width:14px;height:14px;background:#555;border-radius:50%;top:3px;left:3px;transition:transform .2s,background .2s}
.switch.on::after{transform:translateX(14px);background:#EF9F27}
.result-card{background:#0d0d16;border:1px solid #1e1e30;border-radius:16px;padding:1.5rem;margin-top:1rem;transition:border-color .3s}
.result-card.has-url{border-color:#2d1f5e;animation:borderGlow 3s infinite}
.result-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.result-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#534AB7}
.status{font-size:10px;color:#555;display:flex;align-items:center;gap:4px}
.status.ready{color:#1D9E75}
.status-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.url-text{font-size:12px;font-family:'Inter',monospace;color:#AFA9EC;word-break:break-all;line-height:1.8;min-height:40px}
.url-text.empty{color:#444;font-family:'Inter',sans-serif;font-size:13px}
.divider{height:1px;background:#1e1e30;margin:1rem 0}
.copy-btn{width:100%;padding:11px;background:#7F77DD;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.02em}
.copy-btn:hover{background:#534AB7}
.copy-btn:active{transform:scale(.98)}
.copy-btn.copied{background:#0F6E56}
@media(max-width:540px){
  .grid{grid-template-columns:1fr}
  .field.full{grid-column:1}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="wrap anim">
  <div class="header">
    <div class="logo">
      <span class="logo-team">TEAM</span>
      <span class="logo-t4">T4</span>
      <span class="logo-m2">M2</span>
    </div>
    <div class="tagline">Link Builder</div>
  </div>

  <div class="card">
    <div class="section-label">Обовʼязкові</div>
    <div class="grid">
      <div class="field full">
        <label>Домен <span class="tag req">обовʼязково</span></label>
        <input type="text" id="domain" placeholder="bdncas.online" oninput="build()">
      </div>
      <div class="field">
        <label>sub1 <span class="tag fix">фіксовано</span></label>
        <div class="fixed">fb</div>
      </div>
      <div class="field full">
        <label>sub2 — назва оголошення <span class="tag req">обовʼязково</span></label>
        <div class="sub2-box">
          <div class="sub2-option selected" id="sub2-auto" onclick="selectSub2('auto')">
            <div class="sub2-radio"><div class="sub2-radio-dot"></div></div>
            <div class="sub2-text">
              <div class="sub2-title">Автоматично — назва оголошення з FB</div>
              <div class="sub2-val">{{ad.name}}</div>
            </div>
          </div>
          <div class="sub2-option" id="sub2-custom" onclick="selectSub2('custom')">
            <div class="sub2-radio"><div class="sub2-radio-dot"></div></div>
            <div class="sub2-text">
              <div class="sub2-title">Вручну — ввести своє значення</div>
              <div class="sub2-val">ID креатива з F3</div>
            </div>
          </div>
          <div class="sub2-custom-wrap" id="sub2-input-wrap" style="display:none">
            <input type="text" id="sub2-manual" placeholder="Введіть ID креатива" oninput="build()">
          </div>
        </div>
      </div>
      <div class="field">
        <label>sub3 — саб Кейтаро <span class="tag req">обовʼязково</span></label>
        <input type="text" id="sub3" placeholder="264" oninput="build()">
      </div>
      <div class="field">
        <label>sub5 — ID кампанії <span class="tag req">обовʼязково</span></label>
        <input type="text" id="sub5" placeholder="1877575242852085_1" oninput="build()">
      </div>
      <div class="field">
        <label>fbp — ID пікселя <span class="tag req">обовʼязково</span></label>
        <input type="text" id="fbp" placeholder="1591931045350979" oninput="build()">
      </div>
      <div class="field">
        <label>ad_campaign_id <span class="tag req">обовʼязково</span></label>
        <input type="text" id="cid" placeholder="1877575242852085_at" oninput="build()">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Необовʼязкові</div>
    <div class="grid">
      <div class="field">
        <label>sub6 <span class="tag opt">необовʼязково</span></label>
        <input type="text" id="sub6" oninput="build()">
      </div>
      <div class="field">
        <label>sub7 <span class="tag opt">необовʼязково</span></label>
        <input type="text" id="sub7" oninput="build()">
      </div>
      <div class="field full">
        <label>offer_id <span class="tag opt">необовʼязково</span></label>
        <input type="text" id="offer" placeholder="ID з AirTable або Кейтаро" oninput="build()">
      </div>
      <div class="field full" style="margin-top:4px">
        <div class="toggle-row" id="fbclid-row" onclick="toggleFbclid()">
          <div class="toggle-left">
            <div class="toggle-title" id="toggle-title">Додати fbclid для тесту <span class="tag test">тест</span></div>
            <div class="toggle-sub" id="toggle-sub">&fbclid=21412412</div>
          </div>
          <div class="switch" id="switch"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-top">
      <div class="result-label">Готова лінка</div>
      <div class="status" id="status"><span class="status-dot"></span>очікування</div>
    </div>
    <div class="url-text empty" id="output">Заповніть обовʼязкові поля...</div>
    <div class="divider"></div>
    <button class="copy-btn" id="copy-btn" onclick="copy()">Копіювати лінку</button>
  </div>
</div>

<script>
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
let W,H;
const DOTS=80,DIST=140;
let dots=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);
for(let i=0;i<DOTS;i++){dots.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*1.5+.5})}
function draw(){
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<dots.length;i++){
    const d=dots[i];
    d.x+=d.vx;d.y+=d.vy;
    if(d.x<0)d.x=W;if(d.x>W)d.x=0;
    if(d.y<0)d.y=H;if(d.y>H)d.y=0;
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle='rgba(127,119,221,0.5)';ctx.fill();
    for(let j=i+1;j<dots.length;j++){
      const d2=dots[j];
      const dx=d.x-d2.x,dy=d.y-d2.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<DIST){
        const alpha=(1-dist/DIST)*0.12;
        ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d2.x,d2.y);
        ctx.strokeStyle=`rgba(127,119,221,${alpha})`;ctx.lineWidth=.6;ctx.stroke();
      }
    }
  }
  requestAnimationFrame(draw);
}
draw();

let sub2Mode='auto';
let fbclidOn=false;

function selectSub2(mode){
  sub2Mode=mode;
  document.getElementById('sub2-auto').className='sub2-option'+(mode==='auto'?' selected':'');
  document.getElementById('sub2-custom').className='sub2-option'+(mode==='custom'?' selected':'');
  document.getElementById('sub2-input-wrap').style.display=mode==='custom'?'block':'none';
  build();
}

function toggleFbclid(){
  fbclidOn=!fbclidOn;
  document.getElementById('switch').className='switch'+(fbclidOn?' on':'');
  document.getElementById('fbclid-row').className='toggle-row'+(fbclidOn?' active':'');
  document.getElementById('toggle-title').className='toggle-title'+(fbclidOn?' active':'');
  document.getElementById('toggle-sub').className='toggle-sub'+(fbclidOn?' active':'');
  build();
}

function build(){
  const domain=document.getElementById('domain').value.trim().replace(/^https?:\/\//,'').replace(/\/$/,'');
  const sub3=document.getElementById('sub3').value.trim();
  const sub5=document.getElementById('sub5').value.trim();
  const fbp=document.getElementById('fbp').value.trim();
  const cid=document.getElementById('cid').value.trim();
  const sub6=document.getElementById('sub6').value.trim();
  const sub7=document.getElementById('sub7').value.trim();
  const offer=document.getElementById('offer').value.trim();
  const sub2val=sub2Mode==='auto'?'{{ad.name}}':document.getElementById('sub2-manual').value.trim();
  const out=document.getElementById('output');
  const card=document.getElementById('result-card');
  const status=document.getElementById('status');
  const manualEmpty=sub2Mode==='custom'&&!sub2val;
  if(!domain||!sub3||!sub5||!fbp||!cid||manualEmpty){
    out.textContent='Заповніть обовʼязкові поля...';
    out.className='url-text empty';
    card.className='result-card';
    status.innerHTML='<span class="status-dot"></span>очікування';
    status.className='status';
    return;
  }
  let params=`sub1=fb&sub2=${sub2val}&sub3=${sub3}&sub5=${sub5}`;
  if(sub6)params+=`&sub6=${sub6}`;
  if(sub7)params+=`&sub7=${sub7}`;
  params+=`&fbp=${fbp}&ad_campaign_id=${cid}`;
  if(offer)params+=`&offer_id=${offer}`;
  if(fbclidOn)params+=`&fbclid=21412412`;
  out.textContent=`https://${domain}/?${params}`;
  out.className='url-text';
  card.className='result-card has-url';
  status.innerHTML='<span class="status-dot"></span>готово';
  status.className='status ready';
}

function copy(){
  const text=document.getElementById('output').textContent;
  if(text.includes('Заповніть'))return;
  try{
    navigator.clipboard.writeText(text).then(()=>showCopied()).catch(()=>fallbackCopy(text));
  }catch(e){fallbackCopy(text)}
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showCopied();
}
function showCopied(){
  const btn=document.getElementById('copy-btn');
  btn.textContent='Скопійовано!';
  btn.className='copy-btn copied';
  setTimeout(()=>{btn.textContent='Копіювати лінку';btn.className='copy-btn';},2000);
}
</script>
</body>
</html>
