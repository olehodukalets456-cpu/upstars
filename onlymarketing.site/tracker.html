<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM T4 — Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a0f;min-height:100vh;padding:2rem 1rem;position:relative;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.wrap{max-width:720px;margin:0 auto;position:relative;z-index:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px}
.logo{display:inline-flex;align-items:center;gap:8px}
.logo-team{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.02em}
.logo-t4{font-size:16px;font-weight:900;color:#7F77DD}
.logo-m2{font-size:11px;font-weight:700;color:#534AB7;background:#1a1229;border:1px solid #2d1f5e;border-radius:5px;padding:2px 8px}
.logo-page{font-size:11px;color:#333;margin-left:4px;letter-spacing:.08em;text-transform:uppercase}
.add-btn{background:#7F77DD;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:600;padding:9px 18px;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
.add-btn:hover{background:#534AB7}
.empty{text-align:center;color:#333;font-size:14px;padding:4rem 0}
.card{background:#111118;border:1px solid #1e1e30;border-radius:16px;padding:1.25rem;margin-bottom:1rem;animation:fadeUp .3s ease}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.card-name-input{flex:1;background:transparent;border:none;outline:none;font-size:15px;font-weight:700;color:#fff;font-family:'Inter',sans-serif}
.card-name-input::placeholder{color:#333}
.del-btn{background:none;border:1px solid #1e1e30;border-radius:7px;color:#444;font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.del-btn:hover{border-color:#A32D2D;color:#F09595}
.divider{height:1px;background:#1e1e30;margin-bottom:1rem}
.rows{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row-label{font-size:12px;color:#555;font-weight:600;width:52px;flex-shrink:0;letter-spacing:.04em;text-transform:uppercase}
.statuses{display:flex;gap:4px;flex-wrap:wrap}
.s-btn{font-size:10px;font-weight:700;border:none;border-radius:5px;padding:4px 9px;cursor:pointer;opacity:.3;transition:opacity .15s;font-family:'Inter',sans-serif;letter-spacing:.03em}
.s-btn.active{opacity:1}
.s-work{background:#185FA5;color:#E6F1FB}
.s-done{background:#0F6E56;color:#E1F5EE}
.s-block{background:#A32D2D;color:#FCEBEB}
.s-wait{background:#854F0B;color:#FAEEDA}
.note{width:100%;background:#0d0d16;border:1px solid #1e1e30;border-radius:8px;padding:9px 12px;font-size:12px;color:#aaa;font-family:'Inter',sans-serif;resize:none;outline:none;transition:border-color .2s;line-height:1.6}
.note:focus{border-color:#2d2d50}
.note::placeholder{color:#2e2e3e}
.stats-bar{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:#111118;border:1px solid #1e1e30;border-radius:10px;padding:8px 14px;font-size:12px;color:#555;display:flex;align-items:center;gap:6px}
.stat-dot{width:7px;height:7px;border-radius:50%}
.stat-num{font-weight:700;font-size:14px}
.stat-num.blue{color:#378ADD}
.stat-num.green{color:#1D9E75}
.stat-num.red{color:#E24B4A}
.stat-num.amber{color:#EF9F27}
@media(max-width:480px){
  .row-label{width:44px;font-size:10px}
  .s-btn{font-size:9px;padding:3px 7px}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <div class="header">
    <div class="logo">
      <span class="logo-team">TEAM</span>
      <span class="logo-t4">T4</span>
      <span class="logo-m2">M2</span>
      <span class="logo-page">/ Tracker</span>
    </div>
    <button class="add-btn" onclick="addFunnel()">+ Нова воронка</button>
  </div>

  <div class="stats-bar" id="stats-bar"></div>
  <div id="funnels"></div>
</div>

<script>
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
let W,H,dots=[];
const DOTS=70,DIST=130;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);
for(let i=0;i<DOTS;i++)dots.push({x:Math.random()*2000,y:Math.random()*2000,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.4+.4});
function draw(){
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<dots.length;i++){
    const d=dots[i];
    d.x+=d.vx;d.y+=d.vy;
    if(d.x<0)d.x=W;if(d.x>W)d.x=0;
    if(d.y<0)d.y=H;if(d.y>H)d.y=0;
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle='rgba(127,119,221,0.45)';ctx.fill();
    for(let j=i+1;j<dots.length;j++){
      const d2=dots[j];
      const dx=d.x-d2.x,dy=d.y-d2.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<DIST){
        ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d2.x,d2.y);
        ctx.strokeStyle=`rgba(127,119,221,${(1-dist/DIST)*0.1})`;ctx.lineWidth=.6;ctx.stroke();
      }
    }
  }
  requestAnimationFrame(draw);
}
draw();

const STAGES=['PWA','Крео','Назва','ГЕО','Офер'];
const STATUSES=[
  {key:'work',label:'В роботі',cls:'s-work'},
  {key:'done',label:'Готово',cls:'s-done'},
  {key:'block',label:'Блок',cls:'s-block'},
  {key:'wait',label:'Очікування',cls:'s-wait'}
];

let funnels=[];

function load(){
  try{const d=localStorage.getItem('t4_funnels');if(d)funnels=JSON.parse(d);}catch(e){}
  render();
}

function save(){
  try{localStorage.setItem('t4_funnels',JSON.stringify(funnels));}catch(e){}
}

function addFunnel(){
  const id='f_'+Date.now();
  const stages={};
  STAGES.forEach(s=>stages[s]='work');
  funnels.unshift({id,name:'',stages,note:''});
  save();
  render();
  setTimeout(()=>{
    const inp=document.getElementById('name_'+id);
    if(inp)inp.focus();
  },50);
}

function deleteFunnel(id){
  funnels=funnels.filter(f=>f.id!==id);
  save();render();
}

function setStatus(id,stage,status){
  const f=funnels.find(f=>f.id===id);
  if(f){f.stages[stage]=status;save();renderStats();}
}

function setName(id,val){
  const f=funnels.find(f=>f.id===id);
  if(f){f.name=val;save();}
}

function setNote(id,val){
  const f=funnels.find(f=>f.id===id);
  if(f){f.note=val;save();}
}

function renderStats(){
  const counts={work:0,done:0,block:0,wait:0};
  funnels.forEach(f=>STAGES.forEach(s=>counts[f.stages[s]]++));
  const bar=document.getElementById('stats-bar');
  if(funnels.length===0){bar.innerHTML='';return;}
  bar.innerHTML=`
    <div class="stat"><div class="stat-dot" style="background:#185FA5"></div><span class="stat-num blue">${counts.work}</span> в роботі</div>
    <div class="stat"><div class="stat-dot" style="background:#0F6E56"></div><span class="stat-num green">${counts.done}</span> готово</div>
    <div class="stat"><div class="stat-dot" style="background:#A32D2D"></div><span class="stat-num red">${counts.block}</span> блок</div>
    <div class="stat"><div class="stat-dot" style="background:#854F0B"></div><span class="stat-num amber">${counts.wait}</span> очікування</div>
  `;
}

function render(){
  const container=document.getElementById('funnels');
  if(funnels.length===0){
    container.innerHTML='<div class="empty">Немає воронок — натисни "+ Нова воронка"</div>';
    renderStats();return;
  }
  container.innerHTML=funnels.map(f=>`
    <div class="card" id="card_${f.id}">
      <div class="card-header">
        <input class="card-name-input" id="name_${f.id}" value="${esc(f.name)}" placeholder="Назва воронки..." oninput="setName('${f.id}',this.value)">
        <button class="del-btn" onclick="deleteFunnel('${f.id}')">Видалити</button>
      </div>
      <div class="divider"></div>
      <div class="rows">
        ${STAGES.map(stage=>`
          <div class="row">
            <div class="row-label">${stage}</div>
            <div class="statuses">
              ${STATUSES.map(st=>`
                <button class="s-btn ${st.cls}${f.stages[stage]===st.key?' active':''}"
                  onclick="setStatus('${f.id}','${stage}','${st.key}');this.closest('.statuses').querySelectorAll('.s-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">
                  ${st.label}
                </button>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
      <textarea class="note" rows="2" placeholder="Замітка..." oninput="setNote('${f.id}',this.value)">${esc(f.note)}</textarea>
    </div>
  `).join('');
  renderStats();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

load();
</script>
</body>
</html>
