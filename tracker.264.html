<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM T4 M2 — Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a0f;min-height:100vh;padding:2.5rem 2rem;position:relative;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.wrap{max-width:960px;margin:0 auto;position:relative;z-index:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px}
.header-left{display:flex;flex-direction:column;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.logo-team{font-size:28px;font-weight:900;color:#fff;letter-spacing:-.02em}
.logo-t4{font-size:28px;font-weight:900;color:#7F77DD}
.logo-m2{font-size:13px;font-weight:700;color:#534AB7;background:#1a1229;border:1px solid #2d1f5e;border-radius:5px;padding:3px 10px}
.logo-sep{color:#222;font-size:16px;margin:0 4px}
.logo-tracker{font-size:13px;color:#444;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.buyer-badge{display:inline-flex;align-items:center;gap:8px;background:#0d0d16;border:1px solid #1e1e30;border-radius:20px;padding:5px 14px;width:fit-content}
.buyer-avatar{width:24px;height:24px;border-radius:50%;background:#7F77DD;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff}
.buyer-name{font-size:13px;color:#666;font-weight:600}
.buyer-id{font-size:13px;color:#534AB7;font-weight:700;font-family:'Inter',monospace}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.sync-status{font-size:11px;display:flex;align-items:center;gap:6px;color:#444}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#444}
.sync-dot.ok{background:#0F6E56}
.sync-dot.saving{background:#854F0B}
.sync-dot.err{background:#A32D2D}
.header-actions{display:flex;align-items:center;gap:10px}
.add-btn{background:#7F77DD;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;padding:11px 22px;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.03em;display:flex;align-items:center;gap:8px;transition:background .2s}
.add-btn:hover{background:#534AB7}
.mode-badge{display:inline-flex;align-items:center;gap:6px;border-radius:10px;padding:10px 14px;font-size:12px;font-weight:700;font-family:'Inter',sans-serif;border:1px solid #1e1e30;color:#444;cursor:pointer;transition:all .2s}
.mode-badge.edit{border-color:#0F6E56;color:#1D9E75;background:#091a14}
.mode-badge.view{border-color:#1e1e30;color:#444;background:transparent}
.mode-badge:hover{border-color:#534AB7;color:#7F77DD}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2rem}
.stat-card{background:#111118;border:1px solid #1e1e30;border-radius:14px;padding:14px 18px;display:flex;flex-direction:column;gap:6px}
.stat-val{font-size:32px;font-weight:900;line-height:1}
.stat-val.blue{color:#378ADD}
.stat-val.green{color:#1D9E75}
.stat-val.red{color:#E24B4A}
.stat-val.amber{color:#EF9F27}
.stat-lbl{font-size:11px;color:#444;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.stat-line{height:2px;border-radius:2px;margin-top:4px}
.stat-line.blue{background:#185FA5}
.stat-line.green{background:#0F6E56}
.stat-line.red{background:#A32D2D}
.stat-line.amber{background:#854F0B}
.card{background:#111118;border:1px solid #1e1e30;border-radius:18px;padding:1.75rem;margin-bottom:1.25rem;animation:fadeUp .3s ease;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#534AB7,#7F77DD,#534AB7)}
.card-top{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.card-num{font-size:11px;font-weight:700;color:#252535;font-family:'Inter',monospace;flex-shrink:0}
.card-name-input{flex:1;background:transparent;border:none;outline:none;font-size:17px;font-weight:700;color:#fff;font-family:'Inter',sans-serif}
.card-name-input::placeholder{color:#252535}
.card-name-input:read-only{cursor:default}
.del-btn{background:none;border:none;color:#252535;font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;margin-left:auto;transition:color .2s}
.del-btn:hover{color:#A32D2D}
.card-progress{display:flex;gap:3px;margin-bottom:1.25rem}
.cp-seg{height:4px;flex:1;border-radius:2px;background:#1e1e30;transition:background .3s}
.cp-seg.work{background:#185FA5}
.cp-seg.done{background:#0F6E56}
.cp-seg.block{background:#A32D2D}
.cp-seg.wait{background:#854F0B}
.rows{display:flex;flex-direction:column;gap:10px;margin-bottom:1.25rem}
.row{display:flex;align-items:center;gap:12px}
.row-tag{font-size:10px;font-weight:700;color:#2d2d50;width:48px;flex-shrink:0;letter-spacing:.08em;text-transform:uppercase}
.row-label-input{background:#0d0d16;border:1px solid #1a1a2e;border-radius:7px;outline:none;font-size:13px;font-weight:600;color:#777;font-family:'Inter',sans-serif;width:140px;flex-shrink:0;padding:5px 10px;transition:border-color .2s}
.row-label-input:focus{border-color:#534AB7;color:#AFA9EC}
.row-label-input:read-only{opacity:.6;cursor:default}
.row-label-input::placeholder{color:#252535}
.statuses{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.s-btn{font-size:12px;font-weight:700;border:1px solid transparent;border-radius:7px;padding:5px 13px;cursor:pointer;opacity:.2;transition:opacity .15s;font-family:'Inter',sans-serif}
.s-btn.active{opacity:1}
.s-btn.readonly{cursor:default;pointer-events:none}
.s-work{background:#0d1829;color:#85B7EB}
.s-work.active{background:#185FA5;color:#E6F1FB}
.s-done{background:#091a14;color:#5DCAA5}
.s-done.active{background:#0F6E56;color:#E1F5EE}
.s-block{background:#1a0909;color:#F09595}
.s-block.active{background:#A32D2D;color:#FCEBEB}
.s-wait{background:#1a1000;color:#EF9F27}
.s-wait.active{background:#854F0B;color:#FAEEDA}
.note{width:100%;background:#0a0a12;border:1px solid #161625;border-radius:10px;padding:10px 14px;font-size:13px;color:#666;font-family:'Inter',sans-serif;resize:none;outline:none;line-height:1.6}
.note:focus{border-color:#2d2d50;color:#aaa}
.note:read-only{cursor:default;opacity:.6}
.note::placeholder{color:#1e1e30}
.empty-state{text-align:center;padding:5rem 1rem}
.empty-text{font-size:16px;font-weight:700;color:#2d2d50}
.empty-sub{font-size:13px;margin-top:8px;color:#1e1e30}
.loading{text-align:center;padding:3rem;color:#2d2d50;font-size:14px}
.pw-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,15,.97);z-index:100;display:flex;align-items:center;justify-content:center}
.pw-box{background:#111118;border:1px solid #1e1e30;border-radius:20px;padding:2.5rem;width:100%;max-width:380px;text-align:center}
.pw-logo{font-size:22px;font-weight:900;color:#fff;margin-bottom:.5rem}
.pw-logo span{color:#7F77DD}
.pw-sub{font-size:13px;color:#444;margin-bottom:1.5rem}
.pw-input{width:100%;background:#0d0d16;border:1px solid #1e1e30;border-radius:10px;padding:12px 16px;font-size:14px;color:#fff;font-family:'Inter',sans-serif;outline:none;text-align:center;letter-spacing:.1em;margin-bottom:12px;transition:border-color .2s}
.pw-input:focus{border-color:#534AB7}
.pw-input.error{border-color:#A32D2D;animation:shake .3s}
.pw-btn{width:100%;background:#7F77DD;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;padding:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s;margin-bottom:10px}
.pw-btn:hover{background:#534AB7}
.pw-skip{font-size:12px;color:#333;cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'Inter',sans-serif}
.pw-skip:hover{color:#666}
.pw-err{font-size:12px;color:#E24B4A;margin-top:8px;min-height:16px}
@media(max-width:600px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .row-label-input{width:90px}
  .s-btn{font-size:11px;padding:4px 9px}
  body{padding:1.5rem 1rem}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="pw-overlay" id="pw-overlay">
  <div class="pw-box">
    <div class="pw-logo">TEAM <span>T4</span></div>
    <div class="pw-sub">Введи пароль для редагування або пропусти щоб переглядати</div>
    <input class="pw-input" id="pw-input" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">Увійти як редактор</button>
    <button class="pw-skip" onclick="skipPw()">Тільки перегляд</button>
    <div class="pw-err" id="pw-err"></div>
  </div>
</div>

<div class="wrap">
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-team">TEAM</span>
        <span class="logo-t4">T4</span>
        <span class="logo-m2">M2</span>
        <span class="logo-sep">/</span>
        <span class="logo-tracker">Tracker</span>
      </div>
      <div class="buyer-badge">
        <div class="buyer-avatar">O</div>
        <span class="buyer-name">Buyer</span>
        <span class="buyer-id">#264</span>
      </div>
    </div>
    <div class="header-right">
      <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">завантаження...</span></div>
      <div class="header-actions">
        <div class="mode-badge view" id="mode-badge" onclick="toggleMode()">&#128274; перегляд</div>
        <button class="add-btn" id="add-btn" onclick="addFunnel()" style="display:none">+ Нова воронка</button>
      </div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-val blue" id="s-work">0</div><div class="stat-lbl">В роботі</div><div class="stat-line blue"></div></div>
    <div class="stat-card"><div class="stat-val green" id="s-done">0</div><div class="stat-lbl">Готово</div><div class="stat-line green"></div></div>
    <div class="stat-card"><div class="stat-val red" id="s-block">0</div><div class="stat-lbl">Блок</div><div class="stat-line red"></div></div>
    <div class="stat-card"><div class="stat-val amber" id="s-wait">0</div><div class="stat-lbl">Очікування</div><div class="stat-line amber"></div></div>
  </div>

  <div id="funnels"><div class="loading">Завантаження даних...</div></div>
</div>

<script>
const API_KEY='$2a$10$7Xef9jg3UMbuONAEF7yBP.Nevalf3APcYT7HryCWCbjRUPOG7Hea6';
const BIN_ID='69c6cc56b7ec241ddcae03d7';
const CORRECT_PW='upstars264_oleh';
const POLL_INTERVAL=5000;

const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
let W,H,dots=[];
const DOTS=70,DIST=140;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);
for(let i=0;i<DOTS;i++)dots.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.4+.4});
function draw(){
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<dots.length;i++){
    const d=dots[i];
    d.x+=d.vx;d.y+=d.vy;
    if(d.x<0)d.x=W;if(d.x>W)d.x=0;
    if(d.y<0)d.y=H;if(d.y>H)d.y=0;
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle='rgba(127,119,221,0.45)';ctx.fill();
    for(let j=i+1;j<dots.length;j++){
      const d2=dots[j];
      const dx=d.x-d2.x,dy=d.y-d2.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<DIST){
        ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d2.x,d2.y);
        ctx.strokeStyle=`rgba(127,119,221,${(1-dist/DIST)*0.1})`;ctx.lineWidth=.6;ctx.stroke();
      }
    }
  }
  requestAnimationFrame(draw);
}
draw();

const DEFAULT_STAGES=['PWA','Крео','Назва','ГЕО','Офер'];
const STATUSES=[
  {key:'work',label:'В роботі',cls:'s-work'},
  {key:'done',label:'Готово',cls:'s-done'},
  {key:'block',label:'Блок',cls:'s-block'},
  {key:'wait',label:'Очікування',cls:'s-wait'}
];

let funnels=[];
let saveTimer=null;
let isSaving=false;
let lastSavedJSON='';
let canEdit=false;

function checkPw(){
  const val=document.getElementById('pw-input').value;
  const inp=document.getElementById('pw-input');
  if(val===CORRECT_PW){
    localStorage.setItem('t4_auth','1');
    canEdit=true;
    hidePwOverlay();
    applyMode();
  } else {
    inp.className='pw-input error';
    document.getElementById('pw-err').textContent='Невірний пароль';
    setTimeout(()=>{inp.className='pw-input';document.getElementById('pw-err').textContent='';},1500);
  }
}

function skipPw(){
  canEdit=false;
  hidePwOverlay();
  applyMode();
}

function hidePwOverlay(){
  document.getElementById('pw-overlay').style.display='none';
}

function toggleMode(){
  if(canEdit){
    canEdit=false;
    localStorage.removeItem('t4_auth');
    applyMode();
  } else {
    document.getElementById('pw-overlay').style.display='flex';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-err').textContent='';
    setTimeout(()=>document.getElementById('pw-input').focus(),100);
  }
}

function applyMode(){
  const badge=document.getElementById('mode-badge');
  const addBtn=document.getElementById('add-btn');
  if(canEdit){
    badge.className='mode-badge edit';
    badge.textContent='✓ редактор';
    addBtn.style.display='flex';
  } else {
    badge.className='mode-badge view';
    badge.textContent='🔒 перегляд';
    addBtn.style.display='none';
  }
  render();
}

function syncStatus(state,text){
  document.getElementById('sync-dot').className='sync-dot '+state;
  document.getElementById('sync-text').textContent=text;
}

async function loadData(silent=false){
  if(isSaving)return;
  try{
    const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
    const json=await res.json();
    const incoming=JSON.stringify(json.record?.funnels||[]);
    if(incoming!==lastSavedJSON){
      funnels=json.record?.funnels||[];
      lastSavedJSON=incoming;
      localStorage.setItem('t4_backup',incoming);
      render();
      if(!silent)syncStatus('ok','синхронізовано');
    } else {
      if(!silent)syncStatus('ok','актуально');
    }
  }catch(e){
    if(!silent){
      funnels=JSON.parse(localStorage.getItem('t4_backup')||'[]');
      syncStatus('err','офлайн');
      render();
    }
  }
}

async function saveData(){
  if(!canEdit)return;
  isSaving=true;
  syncStatus('saving','збереження...');
  try{
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify({funnels})
    });
    lastSavedJSON=JSON.stringify(funnels);
    localStorage.setItem('t4_backup',lastSavedJSON);
    syncStatus('ok','збережено');
  }catch(e){syncStatus('err','помилка збереження');}
  isSaving=false;
}

function scheduleSave(){if(canEdit){clearTimeout(saveTimer);saveTimer=setTimeout(saveData,600);}}

function addFunnel(){
  if(!canEdit)return;
  const id='f_'+Date.now();
  funnels.unshift({id,name:'',stages:DEFAULT_STAGES.map(s=>({tag:s,label:'',status:'work'})),note:''});
  scheduleSave();render();
  setTimeout(()=>{const i=document.getElementById('n_'+id);if(i)i.focus();},50);
}

function deleteFunnel(id){
  if(!canEdit)return;
  if(!confirm('Видалити воронку?'))return;
  funnels=funnels.filter(f=>f.id!==id);
  scheduleSave();render();
}

function setStatus(id,idx,key){
  if(!canEdit)return;
  const f=funnels.find(f=>f.id===id);
  if(f){f.stages[idx].status=key;scheduleSave();updateStats();updateProgress(id);}
}

function setName(id,v){if(!canEdit)return;const f=funnels.find(f=>f.id===id);if(f){f.name=v;scheduleSave();}}
function setNote(id,v){if(!canEdit)return;const f=funnels.find(f=>f.id===id);if(f){f.note=v;scheduleSave();}}
function setStageLabel(id,idx,v){if(!canEdit)return;const f=funnels.find(f=>f.id===id);if(f){f.stages[idx].label=v;scheduleSave();}}

function updateStats(){
  const c={work:0,done:0,block:0,wait:0};
  funnels.forEach(f=>f.stages.forEach(s=>c[s.status]++));
  ['work','done','block','wait'].forEach(k=>document.getElementById('s-'+k).textContent=c[k]);
}

function updateProgress(id){
  const f=funnels.find(f=>f.id===id);
  if(!f)return;
  document.querySelectorAll('#prog_'+id+' .cp-seg').forEach((seg,i)=>{if(f.stages[i])seg.className='cp-seg '+f.stages[i].status;});
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function render(){
  const el=document.getElementById('funnels');
  if(!funnels.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-text">Немає воронок</div><div class="empty-sub">${canEdit?'Натисни "+ Нова воронка" щоб почати':'Поки що порожньо'}</div></div>`;
    updateStats();return;
  }
  el.innerHTML=funnels.map((f,idx)=>`
    <div class="card" id="card_${f.id}">
      <div class="card-top">
        <span class="card-num">#${String(funnels.length-idx).padStart(2,'0')}</span>
        <input class="card-name-input" id="n_${f.id}" value="${esc(f.name)}" placeholder="Назва воронки..." oninput="setName('${f.id}',this.value)" ${canEdit?'':'readonly'}>
        ${canEdit?`<button class="del-btn" onclick="deleteFunnel('${f.id}')" title="Видалити">&#215;</button>`:''}
      </div>
      <div class="card-progress" id="prog_${f.id}">
        ${f.stages.map(s=>`<div class="cp-seg ${s.status}"></div>`).join('')}
      </div>
      <div class="rows">
        ${f.stages.map((stage,i)=>`
          <div class="row">
            <div class="row-tag">${stage.tag}</div>
            <input class="row-label-input" value="${esc(stage.label)}" placeholder="${stage.tag}..." oninput="setStageLabel('${f.id}',${i},this.value)" ${canEdit?'':'readonly'}>
            <div class="statuses" id="st_${f.id}_${i}">
              ${STATUSES.map(st=>`
                <button class="s-btn ${st.cls}${stage.status===st.key?' active':''}${canEdit?'':' readonly'}"
                  ${canEdit?`onclick="setStatus('${f.id}',${i},'${st.key}');document.querySelectorAll('#st_${f.id}_${i} .s-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')"`:''}>
                  ${st.label}
                </button>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
      <textarea class="note" rows="2" placeholder="Замітка..." oninput="setNote('${f.id}',this.value)" ${canEdit?'':'readonly'}>${esc(f.note)}</textarea>
    </div>
  `).join('');
  updateStats();
}

const saved=localStorage.getItem('t4_auth');
if(saved==='1'){
  canEdit=true;
  hidePwOverlay();
  applyMode();
} else {
  setTimeout(()=>document.getElementById('pw-input').focus(),100);
}

loadData().then(()=>setInterval(()=>loadData(true),POLL_INTERVAL));
</script>
</body>
</html>
